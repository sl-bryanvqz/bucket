object_name: 'Reqres Users - DLT'
source_connection_id: 3
enabled: 1

source_settings:
    extraction_method: "dlt"
    source_type: "rest_api"
    endpoints:
        - name: "users"
          path: "/users"
          method: "GET"
          primary_key: "id"
          params:
              page: 2
          data_selector: "data"  # Maps to your record_path
          paginator:
              type: "page_number"
              page_param: "page"
              page_size: 6  # Reqres returns 6 users per page

target_settings:
    extraction_method: "dlt"
    destination_type: "filesystem"
    layout: "incoming/reqres/default/users/{load_id:%Y-%m-%d}"
    file_format: "json"  # Keep as JSON to match your original
    dataset_name: ""

template_settings:
    template_type: "Notebook"
    template_name: "nb_extract_dlt"
    pipeline_name: "reqres_users_pipeline"

bronze_settings:
    schema_name: reqres
    table_name: default__users

silver_settings:
    schema_name: reqres
    table_name: default__users