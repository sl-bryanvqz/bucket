object_name: 'Northwind Customers'
source_connection_id: 4
enabled: 1

source_system_settings:
    source_name: "northwind"
    resource: "Customers"
    primary_keys: ["CustomerId"]

extraction_template_settings:
    template_type: "Notebook"
    template_name: "nb_extract_api"

raw_settings:
    target_file_path: "northwind/default/customers"
    target_file_name: "customers"
    target_file_type: "json"

option_settings:
    record_path: "value"

bronze_settings:
    schema_name: northwind
    table_name: default__customers

silver_settings:
    schema_name: northwind
    table_name: default__customers
    load_strategy: overwrite