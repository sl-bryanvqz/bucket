# Check whether a business key has duplicates and display samples.
# Useful during curated development and validation.
def validate_duplicates(df, key_col="hashed_pk", limit=10):
    dup_keys_df = (
        df.groupBy(key_col)
          .agg(F.count("*").alias("duplicate_count"))
          .filter(F.col("duplicate_count") > 1)
          .orderBy(F.col("duplicate_count").desc(), F.col(key_col))
    )

    total_dup_groups = dup_keys_df.count()
    print(f"Total duplicate {key_col} groups: {total_dup_groups}")
    display(dup_keys_df.limit(limit))

    if total_dup_groups > 0:
        dup_records_df = (
            df.join(dup_keys_df.select(key_col), on=key_col, how="inner")
              .orderBy(key_col)
        )
        display(dup_records_df.limit(limit))


# Framework-aligned target load helper.
# For now we only keep:
# - merge
# - generic write path for overwrite / append
# We are intentionally not keeping SCD branches here because
# those require hashed_row logic that your current curated notebooks do not need.
def load_to_target(source_df_cleaned, target_table_path, target_load_strategy):
    # If the target table path does not exist yet, create it.
    if not DeltaTable.isDeltaTable(spark, target_table_path):
        logger.info(f'Writing new table to {target_table_path}')
        source_df_cleaned.write.format('delta').mode("overwrite").save(target_table_path)

    else:
        match target_load_strategy:
            case 'merge':
                logger.info(f'Merging new records into {target_table_path}')
                delta_table = DeltaTable.forPath(spark, target_table_path)
                (
                    delta_table.alias("t").merge(
                        source_df_cleaned.alias("s"),
                        't.hashed_pk = s.hashed_pk'
                    ).whenMatchedUpdateAll()
                    .whenNotMatchedInsertAll()
                    .execute()
                )

            case _:
                logger.info(f'Writing new records to {target_table_path} via {target_load_strategy}')
                (
                    source_df_cleaned
                    .write.mode(target_load_strategy)
                    .format("delta")
                    .option("mergeSchema", "true")
                    .save(target_table_path)
                )


# Compatibility wrapper for existing curated notebooks.
# Keep this for now so older notebooks can still call merge_to_target()
# while you transition them to load_to_target().
def merge_to_target(df, target_schema, target_table, location_path, merge_key="hashed_pk"):
    full_table_name = f"{target_schema}.{target_table}"

    # Some older notebooks may pass a different merge key name.
    # Rename it only if hashed_pk does not already exist.
    if merge_key != "hashed_pk" and "hashed_pk" not in df.columns:
        df = df.withColumnRenamed(merge_key, "hashed_pk")

    # Keep the old create behavior so current curated notebooks continue to work.
    if not DeltaTable.isDeltaTable(spark, location_path):
        (
            df.write
            .format("delta")
            .mode("overwrite")
            .option("path", location_path)
            .option("overwriteSchema", "true")
            .saveAsTable(full_table_name)
        )
        print(f"Created {full_table_name}")
    else:
        load_to_target(df, location_path, "merge")
        print(f"Merged into {full_table_name}")

