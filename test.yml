# Map source views into target shape
# This is the only cell that contains business mapping and joins
for cfg in table_config:
    source_tables = cfg.get("source_tables", [])
    main_source_table = source_tables[0]
    main_source_view = f"src_{to_snake_case(main_source_table)}"

    target_table = cfg.get("target_table")
    target_prefix = f"{target_schema}_"
    target_entity = target_table[len(target_prefix):] if target_table.startswith(target_prefix) else to_snake_case(target_table)

    map_view = f"map_{target_entity}"

    # Map Band Level
    if target_entity == "curated_band_level":
        spark.sql(f"""
        CREATE OR REPLACE TEMP VIEW {map_view} AS
        SELECT band_level_key, band_level_code, band_level_description, band_group_code, band_group_description, is_active
        FROM {main_source_view}
        """)

    # Map Bill Type
    elif target_entity == "curated_bill_type":
        spark.sql(f"""
        CREATE OR REPLACE TEMP VIEW {map_view} AS
        SELECT bill_type_key, bill_type_code, bill_type_description, is_active
        FROM {main_source_view}
        """)

    # Map Client Sector
    elif target_entity == "curated_client_sector":
        spark.sql(f"""
        CREATE OR REPLACE TEMP VIEW {map_view} AS
        SELECT client_sector_key, sic_code, ibg_code, ibg_sector_code, sic_code_description, ibg_code_description, ibg_sector_code_description, default_matter_sub_industry_code, is_active
        FROM {main_source_view}
        """)

    # Map Company
    elif target_entity == "curated_company":
        spark.sql(f"""
        CREATE OR REPLACE TEMP VIEW {map_view} AS
        SELECT company_key, company_code, member_firm_code, company_name, city, country_code_iso2, currency_code, is_active
        FROM {main_source_view}
        """)

    # Map Country
