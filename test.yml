import re
import pyspark.sql.functions as F
def normalize_column_name(name: str) -> str:
    name = name.strip()
    name = re.sub(r"[^A-Za-z0-9]+", "_", name)
    name = re.sub(r"_+", "_", name)
    return name.strip("_").lower()
