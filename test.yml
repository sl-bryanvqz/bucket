def to_snake_case_local(string):
    string = re.sub(r"([a-z])([A-Z0-9])", r"\1_\2", string)
    string = re.sub(r"([A-Z])([A-Z][a-z])", r"\1_\2", string)
    return string.lower().strip()





prepared_tables = []
status = "Failed"




for cfg in table_config:
    column_list = cfg["select_columns"]
    column_list_sql = ", ".join(column_list)

    source_table = cfg["table_name"]
    source_schema = cfg["schema_name"]
    target_table = cfg["target_table"]
    target_schema = target_schema_name
    watermark_col = cfg.get("incremental_column")
    primary_keys = cfg.get("primary_keys", [])
    is_incremental = cfg.get("is_incremental", 0)

    full_source_name = f"{source_schema}.{source_table}"
    full_target_name = f"{target_schema}.{target_table}"
    target_table_path = f"{location_root}/{target_table}"

    src_view = f"src_{source_table.lower()}"
    delta_view = f"delta_{source_table.lower()}"

    logger.info(f"Starting {full_source_name} -> {full_target_name}")

    watermark_predicate = "1 = 1"
    if is_incremental == 1 and prev_wm and curr_wm and watermark_col:
        watermark_predicate = f"{watermark_col} > '{prev_wm}' AND {watermark_col} <= '{curr_wm}'"

    source_query = f"""
    (
        SELECT {column_list_sql}
        FROM {full_source_name}
        WHERE {watermark_predicate}
    ) AS src
    """

    df_source = spark.read.jdbc(
        url=jdbc_url,
        table=source_query,
        properties=connection_properties
    )

    df_source.createOrReplaceTempView(src_view)
    logger.info(f"Created temp view {src_view}")

    if limit_rows_for_debugging:
        spark.sql(f"""
            CREATE OR REPLACE TEMP VIEW {src_view} AS
            SELECT *
            FROM {src_view}
            LIMIT 1000
        """)

    df_src_clean = clean_bronze_table(spark.table(src_view), limit_rows_for_debugging=False)
    df_src_clean = remove_exact_duplicates(df_src_clean)
    df_src_clean.createOrReplaceTempView(src_view)

    business_columns = [to_snake_case_local(col) for col in column_list]
    pk_expr = ", ".join([f"CAST({to_snake_case_local(col)} AS STRING)" for col in primary_keys])

    spark.sql(f"""
    CREATE OR REPLACE TEMP VIEW {delta_view} AS
    SELECT
        *,
        CURRENT_TIMESTAMP() AS _ingest_time,
        '{str(date.today())}' AS _ingest_date,
        '{full_source_name}' AS _source_file,
        '{source_name}' AS _source_system,
        '{target_table}' AS _table,
        '{lineage_id}' AS _lineage_id,
        sha2(concat_ws('||', {pk_expr}), 256) AS _hashed_pk
    FROM {src_view}
    """)

    prepared_tables.append({
        "source_table": full_source_name,
        "target_table": full_target_name,
        "target_table_path": target_table_path,
        "delta_view": delta_view,
        "business_columns": business_columns
    })

display(prepared_tables)




for item in prepared_tables:
    source_table = item["source_table"]
    full_target_name = item["target_table"]
    target_table_path = item["target_table_path"]
    delta_view = item["delta_view"]
    business_columns = item["business_columns"]

    metadata_columns = [
        "_ingest_time",
        "_ingest_date",
        "_source_file",
        "_source_system",
        "_table",
        "_lineage_id",
        "_hashed_pk"
    ]

    all_merge_columns = business_columns + metadata_columns
    update_columns = [col for col in all_merge_columns if col != "_hashed_pk"]

    merge_update_sql = ",\n        ".join([f"t.{col} = s.{col}" for col in update_columns])
    merge_insert_columns_sql = ", ".join(all_merge_columns)
    merge_insert_values_sql = ", ".join([f"s.{col}" for col in all_merge_columns])

    df_delta = spark.table(delta_view)
    validate_duplicates(df_delta, "_hashed_pk", 10)

    spark.sql(f"CREATE SCHEMA IF NOT EXISTS {target_schema_name}")

    if not DeltaTable.isDeltaTable(spark, target_table_path):
        logger.info(f"Initial load for {full_target_name}")
        (
            df_delta.write
            .format("delta")
            .mode("overwrite")
            .save(target_table_path)
        )

        spark.sql(f"""
        CREATE TABLE IF NOT EXISTS {full_target_name}
        USING DELTA
        LOCATION '{target_table_path}'
        """)
    else:
        merge_sql = f"""
        MERGE INTO {full_target_name} AS t
        USING {delta_view} AS s
        ON t._hashed_pk = s._hashed_pk
        WHEN MATCHED THEN
            UPDATE SET
                {merge_update_sql}
        WHEN NOT MATCHED THEN
            INSERT ({merge_insert_columns_sql})
            VALUES ({merge_insert_values_sql})
        """

        print(merge_sql)
        spark.sql(merge_sql)

status = "Completed"




