from pyspark.sql.functions import count

# 1. Find duplicate hashed_pk values
dup_keys_df = (
    df.groupBy("hashed_pk")
      .agg(count("*").alias("duplicate_count"))
      .filter("duplicate_count > 1")
)

print("Duplicate hashed_pk values:")
dup_keys_df.show(50, truncate=False)

print(f"Total duplicate keys: {dup_keys_df.count()}")

# 2. Bring back the actual duplicate records
dup_records_df = (
    df.join(dup_keys_df.select("hashed_pk"), on="hashed_pk", how="inner")
      .orderBy("hashed_pk")
)

print("Sample duplicate records:")
display(dup_records_df.limit(10))
