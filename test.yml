# Standard framework logging setup.
setup_logging()
logger = logging.getLogger("LoadTaxonomyToSilver")
logger.setLevel(logging.INFO)



# Accept either JSON strings from pipeline or already-parsed dicts for manual runs.
source_settings = json.loads(source_settings) if isinstance(source_settings, str) else source_settings
target_settings = json.loads(target_settings) if isinstance(target_settings, str) else target_settings

# Source configuration
source_name = source_settings.get("source_name")
source_schema = source_settings.get("source_schema")
table_config = source_settings.get("table_config", [])

# Target configuration
target_lakehouse_name = target_settings.get("lakehouse_name")
target_schema = target_settings.get("schema_name")
target_load_strategy = target_settings.get("load_strategy", "overwrite")
location_root = target_settings.get("location_root")

print(source_name)
print(source_schema)
print(target_schema)
display(table_config)




# Load shortcut tables to silver.
status = "Failed"
load_results = []

try:
    for cfg in table_config:
        source_table = cfg.get("source_table")
        target_table = cfg.get("target_table")

        full_source_name = f"{source_schema}.{source_table}"
        full_target_name = f"{target_schema}.{target_table}"
        target_table_path = f"{location_root}/{target_table}"

        # Read shortcut table exactly as-is.
        df_source = spark.table(full_source_name)
        rows_read = df_source.count()

        # Replace target data using the shared load function.
        load_to_target(df_source, target_table_path, target_load_strategy)

        # Register target path as table if needed.
        spark.sql(f"""
        CREATE TABLE IF NOT EXISTS {full_target_name}
        USING DELTA
        LOCATION '{target_table_path}'
        """)

        load_results.append({
            "table": full_target_name,
            "rows_read": rows_read,
            "rows_inserted": rows_read,
            "rows_updated": 0,
            "rows_copied": rows_read
        })

        print(full_target_name)
        print(f"rows_replaced: {rows_read}")

    status = "Completed"

except Exception:
    logger.exception("Processing error.")
    status = "Failed"
    raise




# Quick target validation.
for cfg in table_config:
    target_table = cfg.get("target_table")
    full_target_name = f"{target_schema}.{target_table}"

    df_check = spark.table(full_target_name)
    print(f"{full_target_name}: {df_check.count()} rows")
    display(df_check.limit(5))
