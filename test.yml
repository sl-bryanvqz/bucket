def clean_string(col_name: str) -> str:
    return f"""
    CASE
        WHEN {col_name} IS NULL THEN 'Unknown'
        WHEN TRIM(CAST({col_name} AS STRING)) IN ('', '#') THEN 'Unknown'
        ELSE TRIM(CAST({col_name} AS STRING))
    END
    """


spark.sql(f"""
CREATE TABLE IF NOT EXISTS {target_schema}.{target_table} (
    efi_key                             BIGINT,
    unit                                STRING,
    company_key                         STRING,
    member_firm_code                    STRING,
    profit_center_code                  STRING,
    cost_center_code                    STRING,
    gl_account_code                     STRING,
    fe_person_number                    STRING,
    fe_practice_group_key               STRING,
    fe_office_key                       STRING,
    fe_team_key                         STRING,
    lead_partner_person_number          STRING,
    lead_partner_practice_group_key     STRING,
    lead_partner_office_key             STRING,
    lead_partner_team_key               STRING,
    matter_number                       STRING,
    vendor_code                         STRING,
    document_text                       STRING,
    document_date                       DATE,
    document_number                     STRING,
    transaction_document_type_key       STRING,
    posting_period                      STRING,
    posting_date                        DATE,
    document_currency_code              STRING,
    actual_amount_dc                    DOUBLE,
    office_currency_code                STRING,
    actual_amount_oc                    DOUBLE,
    group_currency_code                 STRING,
    actual_amount_gc                    DOUBLE,
    budget_amount_gc                    DOUBLE,
    forecast_amount_gc                  DOUBLE,
    last_updated_date_utc_at_source     TIMESTAMP,

    _ingest_date                        DATE,
    _source_file                        STRING,
    _source_system                      STRING,
    _table                              STRING,
    _lineage_id                         STRING,
    _effective_start_datetime           TIMESTAMP,
    _effective_end_datetime             TIMESTAMP,
    _current_flag                       BOOLEAN,
    hashed_pk                           STRING
)
USING DELTA
LOCATION '{location_path}'
{tbl_properties}
""")


df = spark.sql(f"""
SELECT DISTINCT
    CAST(NULL AS BIGINT) AS efi_key,
    {clean_string("unit")} AS unit,
    {clean_string("company_code")} AS company_key,
    {clean_string("company_region_src")} AS member_firm_code,
    {clean_string("profit_center_code")} AS profit_center_code,
    {clean_string("cost_center_code")} AS cost_center_code,
    {clean_string("gl_account_code")} AS gl_account_code,
    {clean_string("fe_code")} AS fe_person_number,
    {clean_string("fe_practice_group_code")} AS fe_practice_group_key,
    {clean_string("fe_office_code")} AS fe_office_key,
    {clean_string("fe_team_code")} AS fe_team_key,
    {clean_string("lead_partner_code")} AS lead_partner_person_number,
    {clean_string("lead_partner_practice_group_code")} AS lead_partner_practice_group_key,
    {clean_string("lead_partner_office_code")} AS lead_partner_office_key,
    {clean_string("lead_partner_team_code")} AS lead_partner_team_key,
    {clean_string("matter_code")} AS matter_number,
    {clean_string("vendor_code")} AS vendor_code,
    {clean_string("document_text")} AS document_text,
    TO_DATE(CAST(document_date AS STRING), 'yyyyMMdd') AS document_date,
    {clean_string("document_number")} AS document_number,
    {clean_string("document_type_code")} AS transaction_document_type_key,
    {clean_string("posting_period")} AS posting_period,
    TO_DATE(CAST(posting_date AS STRING), 'yyyyMMdd') AS posting_date,
    {clean_string("document_currency_code")} AS document_currency_code,
    CAST(actual_amount_dc AS DOUBLE) AS actual_amount_dc,
    {clean_string("office_currency_code")} AS office_currency_code,
    CAST(actual_amount_oc AS DOUBLE) AS actual_amount_oc,
    {clean_string("group_currency_code")} AS group_currency_code,
    CAST(actual_amount_gc AS DOUBLE) AS actual_amount_gc,
    CAST(budget_amount_gc AS DOUBLE) AS budget_amount_gc,
    CAST(forecast_amount_gc AS DOUBLE) AS forecast_amount_gc,
    TO_TIMESTAMP(lastupdatedt, 'dd/MM/yyyy') AS last_updated_date_utc_at_source,

    CAST(_ingest_date AS DATE) AS _ingest_date,
    CAST(_source_file AS STRING) AS _source_file,
    CAST(_source_system AS STRING) AS _source_system,
    'efi' AS _table,
    CAST('44444444-4444-4444-aaaa-aaaaaaaaaaaa' AS STRING) AS _lineage_id,
    CURRENT_TIMESTAMP() AS _effective_start_datetime,
    TO_TIMESTAMP('9999-12-31 23:59:59') AS _effective_end_datetime,
    TRUE AS _current_flag,

    md5(concat_ws('|',
        {clean_string("company_code")},
        {clean_string("company_region_src")},
        {clean_string("profit_center_code")},
        {clean_string("cost_center_code")},
        {clean_string("gl_account_code")},
        {clean_string("fe_code")},
        {clean_string("fe_practice_group_code")},
        {clean_string("fe_office_code")},
        {clean_string("fe_team_code")},
        {clean_string("lead_partner_code")},
        {clean_string("lead_partner_practice_group_code")},
        {clean_string("lead_partner_office_code")},
        {clean_string("lead_partner_team_code")},
        {clean_string("matter_code")},
        {clean_string("vendor_code")},
        {clean_string("document_text")},
        {clean_string("document_number")},
        {clean_string("document_type_code")},
        {clean_string("posting_period")},
        {clean_string("document_currency_code")},
        {clean_string("office_currency_code")},
        {clean_string("group_currency_code")}
    )) AS hashed_pk
FROM {source_schema}.{source_table}
""")

display(df.limit(10))


dup_keys_df = (
    df.groupBy("hashed_pk")
      .agg(count("*").alias("duplicate_count"))
      .filter("duplicate_count > 1")
      .orderBy("duplicate_count", ascending=False)
)

print(f"Total duplicate hashed_pk groups: {dup_keys_df.count()}")
display(dup_keys_df.limit(10))

dup_records_df = (
    df.join(dup_keys_df.select("hashed_pk"), on="hashed_pk", how="inner")
      .orderBy("hashed_pk")
)

display(dup_records_df.limit(10))



if not DeltaTable.isDeltaTable(spark, location_path):
    (
        df.write
        .format("delta")
        .mode("overwrite")
        .option("path", location_path)
        .option("overwriteSchema", "true")
        .saveAsTable(f"{target_schema}.{target_table}")
    )
    print(f"Created {target_schema}.{target_table}")
else:
    delta_table = DeltaTable.forPath(spark, location_path)

    (
        delta_table.alias("t")
        .merge(
            df.alias("s"),
            "t.hashed_pk = s.hashed_pk"
        )
        .whenMatchedUpdateAll()
        .whenNotMatchedInsertAll()
        .execute()
    )

    print(f"Merged into {target_schema}.{target_table}")



    display(
    spark.sql(f"""
    SELECT *
    FROM {target_schema}.{target_table}
    ORDER BY _effective_start_datetime DESC
    LIMIT 20
    """)
)
