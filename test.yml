# Print merge metrics.
delta_table = DeltaTable.forPath(spark, target_table_path)
operation_metrics = delta_table.history(1).select("operationMetrics").collect()[0]["operationMetrics"]

rows_inserted = int(operation_metrics.get("numTargetRowsInserted", 0))
rows_updated = int(operation_metrics.get("numTargetRowsUpdated", 0))
rows_deleted = int(operation_metrics.get("numTargetRowsDeleted", 0))
rows_copied = int(operation_metrics.get("numTargetRowsCopied", 0))
rows_affected = rows_inserted + rows_updated + rows_deleted

print(full_target_name)
print(f"rows_inserted: {rows_inserted}")
print(f"rows_updated: {rows_updated}")
print(f"rows_deleted: {rows_deleted}")
print(f"rows_copied: {rows_copied}")
print(f"rows_affected: {rows_affected}")




# Check what merge-scd1 will insert or update before loading
for cfg in table_config:
    target_table = cfg.get("target_table")

    target_prefix = f"{target_schema}_"
    target_entity = target_table[len(target_prefix):] if target_table.startswith(target_prefix) else to_snake_case(target_table)

    target_view = f"tgt_{target_entity}"
    target_table_path = f"{location_root}/{target_table}"

    if DeltaTable.isDeltaTable(spark, target_table_path):
        df_source = spark.table(target_view).select("_hashed_pk", "_hashed_row")
        df_target = DeltaTable.forPath(spark, target_table_path).toDF().select("_hashed_pk", "_hashed_row")

        rows_to_insert = (
            df_source.alias("s")
            .join(df_target.alias("t"), "_hashed_pk", "left_anti")
            .count()
        )

        rows_to_update = (
            df_source.alias("s")
            .join(df_target.alias("t"), "_hashed_pk", "inner")
            .filter("NOT (t._hashed_row <=> s._hashed_row)")
            .count()
        )

        print(target_table)
        print(f"rows_to_insert: {rows_to_insert}")
        print(f"rows_to_update: {rows_to_update}")
