# Framework-compatible parameters with manual fallbacks.
# When pl_worker calls this notebook, it should pass these values.
import json
import uuid
from datetime import date

task_id = task_id or 0
parent_run_id = parent_run_id or ""
task_executions_id = task_executions_id or ""
lineage_id = lineage_id or str(uuid.uuid4())
source_connection_settings = source_connection_settings or "{}"
limit_rows_for_debugging = limit_rows_for_debugging or False

# Manual fallback for source settings.
# In framework runs, pl_worker should pass source_settings directly.
source_settings = source_settings or json.dumps({
    "lakehouse_name": "lh_global_external_curated",
    "folder_path": "Files/transactional_data",
    "source_system": "lh_global_external_curated",
    "table_config": [
        {"source_file": "EFI.csv", "target_table": "efi"},
        {"source_file": "TME.csv", "target_table": "tme"},
        {"source_file": "ChronoMetrics.csv", "target_table": "chrono_metrics"}
    ]
})

# Manual fallback for target settings.
# In framework runs, pl_worker should pass target_settings directly.
target_settings = target_settings or json.dumps({
    "lakehouse_name": "lh_canada_global_mds",
    "schema_name": "base_transactional",
    "load_strategy": "overwrite"
})

if isinstance(limit_rows_for_debugging, str):
    limit_rows_for_debugging = limit_rows_for_debugging.lower() == "true"








