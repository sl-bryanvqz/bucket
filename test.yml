        (
            df.write
            .format("delta")
            .mode("overwrite")
            .option("path", target_path)
            .option("mergeSchema", "true")
            .saveAsTable(full_table)
        )
    else:
        (
            df.write
            .format("delta")
            .mode("overwrite")
