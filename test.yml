# Cell 5
table_config = [
    {"source_file": "EFI.csv", "target_table": "efi"},
    {"source_file": "TME.csv", "target_table": "tme"},
    {"source_file": "ChronoMetrics.csv", "target_table": "chrono_metrics"}
]

# Cell 6
spark.sql(f"CREATE SCHEMA IF NOT EXISTS {target_schema}")
print(f"Schema ready: {target_schema}")
print(f"Target workspace id: {target_workspace_id}")
print(f"Target lakehouse id: {target_lakehouse_id}")
print(f"Load strategy: {target_load_strategy}")


# Cell 7
for cfg in table_config:
    source_file = cfg["source_file"]
    target_table = cfg["target_table"]
    full_table = f"{target_schema}.{target_table}"

    source_file_path = (
        f"abfss://{source_workspace_id}@onelake.dfs.fabric.microsoft.com/"
        f"{source_lakehouse_id}.Lakehouse/{source_folder}/{source_file}"
    )

    print(f"Processing {source_file} -> {full_table}")
    print(f"Source path: {source_file_path}")

    df = (
        spark.read.format("csv")
        .option("header", "true")
        .option("inferSchema", "true")
        .option("delimiter", ",")
        .load(source_file_path)
    )

    df = clean_bronze_table(df, limit_rows_for_debugging)

    before_count = df.count()
    df = remove_exact_duplicates(df)
    after_count = df.count()

    print(f"{source_file} removed {before_count - after_count} duplicate rows")

    df = add_metadata(
        df=df,
        ingest_date=str(date.today()),
        file_path=source_file_path,
        source_system=source_system,
        table_name=target_table,
        lineage_id=new_lineage_id()
    )

    if target_load_strategy == "overwrite":
        (
            df.write
            .format("delta")
            .mode("overwrite")
            .option("overwriteSchema", "true")
            .saveAsTable(full_table)
        )
        print(f"Overwrote {full_table}")

    elif target_load_strategy == "append":
        (
            df.write
            .format("delta")
            .mode("append")
            .option("mergeSchema", "true")
            .saveAsTable(full_table)
        )
        print(f"Appended into {full_table}")

    else:
        raise ValueError(f"Unsupported load_strategy: {target_load_strategy}")


    # Cell 8
for cfg in table_config:
    full_table = f"{target_schema}.{cfg['target_table']}"
