Cell 1
# Source lakehouse/file
SOURCE_WORKSPACE_ID = "<source_workspace_id>"
SOURCE_LAKEHOUSE_ID = "<source_lakehouse_id>"
SOURCE_FOLDER = "Files/transactional_data"
SOURCE_FILE = "EFI.csv"

# Target in the default attached lakehouse
TARGET_SCHEMA = "base_transactional"
TARGET_TABLE = "efi"

# Minimal traceability
SOURCE_SYSTEM = "lh_global_external_curated"

# Use overwrite while testing, then switch to append later if needed
LOAD_MODE = "overwrite"
Cell 2
import re
import pyspark.sql.functions as F
Cell 3
source_file_path = (
    f"abfss://{SOURCE_WORKSPACE_ID}@onelake.dfs.fabric.microsoft.com/"
    f"{SOURCE_LAKEHOUSE_ID}/{SOURCE_FOLDER}/{SOURCE_FILE}"
)

print(source_file_path)
Cell 4
df = (
    spark.read.format("csv")
    .option("header", "true")
    .option("inferSchema", "true")
    .option("delimiter", ",")
    .load(source_file_path)
)

print("Rows:", df.count())
display(df.limit(20))
print(df.columns)
Cell 5
def normalize_column_name(name: str) -> str:
    name = name.strip()
    name = re.sub(r"[^A-Za-z0-9]+", "_", name)
    name = re.sub(r"_+", "_", name)
    return name.strip("_").lower()

df = df.toDF(*[normalize_column_name(c) for c in df.columns])

print(df.columns)
display(df.limit(10))
Cell 6
df = (
    df
    .withColumn("_ingest_time", F.current_timestamp())
    .withColumn("_source_file", F.lit(SOURCE_FILE))
    .withColumn("_source_system", F.lit(SOURCE_SYSTEM))
)

display(df.limit(10))
Cell 7
spark.sql(f"CREATE SCHEMA IF NOT EXISTS {TARGET_SCHEMA}")
print(f"Schema ready: {TARGET_SCHEMA}")
Cell 8
target_table_fqn = f"{TARGET_SCHEMA}.{TARGET_TABLE}"

(
    df.write
    .format("delta")
    .mode(LOAD_MODE)
    .option("mergeSchema", "true")
    .saveAsTable(target_table_fqn)
)

print(f"Loaded {SOURCE_FILE} into {target_table_fqn}")
Cell 9
result_df = spark.table(target_table_fqn)

print("Target rows:", result_df.count())
display(result_df.limit(20))
print(result_df.columns)
