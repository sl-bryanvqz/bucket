# Framework-compatible parameters with manual fallbacks.
# When pl_worker calls this notebook, it should pass these values.
import json
import uuid
import logging
from datetime import date

task_id = 50
parent_run_id = ""
task_executions_id = ""
lineage_id = str(uuid.uuid4())
source_connection_settings = "{}"
limit_rows_for_debugging = False

# Manual fallback for source settings.
source_settings = json.dumps({
    "lakehouse_name": "lh_canada_global_mds",
    "folder_path": "Files/silver/silver_transactional_csv",
    "source_system": "lh_canada_global_mds",
    "table_config": [
        {"source_file": "EFI.csv", "target_table": "silver_transactional_efi"},
        {"source_file": "TME.csv", "target_table": "silver_transactional_tme"},
        {"source_file": "ChronoMetrics.csv", "target_table": "silver_transactional_chrono_metrics"}
    ]
})

# Manual fallback for target settings.
target_settings = json.dumps({
    "lakehouse_name": "lh_canada_global_mds",
    "schema_name": "silver_transactional",
    "load_strategy": "overwrite"
})




%run nb_transactional_shared_functions



# Standard framework logging setup.
setup_logging()
logger = logging.getLogger("LoadTransactionalToSilver")
logger.setLevel(logging.INFO)




# Accept either JSON strings (framework) or already-parsed dicts (manual/debug).
source_settings = json.loads(source_settings) if isinstance(source_settings, str) else source_settings
target_settings = json.loads(target_settings) if isinstance(target_settings, str) else target_settings
source_connection_settings = json.loads(source_connection_settings) if isinstance(source_connection_settings, str) else source_connection_settings

# Source configuration
source_lakehouse_name = source_settings.get("lakehouse_name")
source_folder_path = source_settings.get("folder_path")
source_system = source_settings.get("source_system", source_lakehouse_name)
table_config = source_settings.get("table_config", [])

# Target configuration
target_lakehouse_name = target_settings.get("lakehouse_name")
target_schema = target_settings.get("schema_name")
target_load_strategy = target_settings.get("load_strategy", "overwrite")

# Resolve lakehouse storage paths by name.
source_lakehouse_path = notebookutils.lakehouse.get(source_lakehouse_name).properties["abfsPath"]
target_lakehouse_path = notebookutils.lakehouse.get(target_lakehouse_name).properties["abfsPath"]

logger.info(f"Source lakehouse: {source_lakehouse_name}")
logger.info(f"Target lakehouse: {target_lakehouse_name}")
logger.info(f"Target schema: {target_schema}")
logger.info(f"Load strategy: {target_load_strategy}")




status = "Failed"

try:
    spark.sql(f"CREATE SCHEMA IF NOT EXISTS {target_schema}")

    for cfg in table_config:
        source_file = cfg["source_file"]
        target_table = cfg["target_table"]
        full_table_name = f"{target_schema}.{target_table}"

        # This must match the LOCATION used when the silver schema notebook created the tables.
        target_table_path = f"{target_lakehouse_path}/Files/silver/transactional/{target_table}"
        source_file_path = f"{source_lakehouse_path}/{source_folder_path}/{source_file}"

        logger.info(f"Processing {source_file} -> {full_table_name}")
        logger.info(f"Source path: {source_file_path}")
        logger.info(f"Target path: {target_table_path}")

        # Read source CSV file.
        df = (
            spark.read.format("csv")
            .option("header", "true")
            .option("inferSchema", "true")
            .option("delimiter", ",")
            .load(source_file_path)
        )

        # Keep original column names so they match the silver schema you already created.
        if limit_rows_for_debugging:
            df = df.limit(1000)

        df = trim_all_string_columns(df)
        df = replace_old_dates(df)

        # Remove exact duplicate rows.
        before_count = df.count()
        df = remove_exact_duplicates(df)
        after_count = df.count()

        logger.info(f"{source_file} removed {before_count - after_count} duplicate rows")

        # Stamp framework metadata columns.
        df = add_metadata(
            df=df,
            ingest_date=str(date.today()),
            file_path=source_file_path,
            source_system=source_system,
            table_name=target_table,
            lineage_id=lineage_id
        )

        # Validate dataframe schema against the precreated target table schema.
        target_df = spark.table(full_table_name)

        source_schema = {field.name: field.dataType.simpleString() for field in df.schema.fields}
        target_schema_map = {field.name: field.dataType.simpleString() for field in target_df.schema.fields}

        source_cols = set(source_schema.keys())
        target_cols = set(target_schema_map.keys())

        missing_in_source = sorted(target_cols - source_cols)
        extra_in_source = sorted(source_cols - target_cols)

        type_mismatches = sorted(
            [
                f"{col}: source={source_schema[col]} target={target_schema_map[col]}"
                for col in (source_cols & target_cols)
                if source_schema[col] != target_schema_map[col]
            ]
        )

        if missing_in_source or extra_in_source or type_mismatches:
            error_parts = []
            if missing_in_source:
                error_parts.append(f"Missing in source: {missing_in_source}")
            if extra_in_source:
                error_parts.append(f"Extra in source: {extra_in_source}")
            if type_mismatches:
                error_parts.append(f"Type mismatches: {type_mismatches}")

            raise ValueError(
                f"Schema validation failed for {full_table_name}. " + " | ".join(error_parts)
            )

        # Reorder columns to match the target table exactly.
        df = df.select(*target_df.columns)

        logger.info(f"Schema validation passed for {full_table_name}")

        # Commented out for validation/debugging only.
        # load_to_target(df, target_table_path, target_load_strategy)

        logger.info(f"Prepared {source_file} for {full_table_name}")

    status = "Completed"

except Exception:
    logger.exception("Processing error.")
    status = "Failed"
    raise
