efi_df = spark.sql(f"""
SELECT
    CAST(NULL AS BIGINT) AS efi_key,
    COALESCE(CAST(unit AS STRING), 'Unknown') AS unit,
    CAST(-1 AS BIGINT) AS company_key,
    COALESCE(CAST(company_region_src AS STRING), 'Unknown') AS member_firm_code,
    COALESCE(CAST(cost_center_code AS STRING), 'Unknown') AS cost_centre_code,
    COALESCE(CAST(gl_account_code AS STRING), 'Unknown') AS gl_account_code,
    COALESCE(CAST(fe_code AS STRING), 'Unknown') AS fe_person_number,
    CAST(-1 AS BIGINT) AS fe_practice_group_key,
    CAST(-1 AS BIGINT) AS fe_office_key,
    CAST(-1 AS BIGINT) AS fe_team_key,
    COALESCE(CAST(lead_partner_code AS STRING), 'Unknown') AS lead_partner_person_number,
    CAST(-1 AS BIGINT) AS lead_partner_practice_group_key,
    CAST(-1 AS BIGINT) AS lead_partner_office_key,
    CAST(-1 AS BIGINT) AS lead_partner_team_key,
    COALESCE(CAST(matter_code AS STRING), 'Unknown') AS matter_number,
    COALESCE(CAST(vendor_code AS STRING), 'Unknown') AS vendor_code,
    COALESCE(CAST(document_text AS STRING), 'Unknown') AS document_text,
    TO_DATE(CAST(document_date AS STRING), 'yyyyMMdd') AS document_date,
    COALESCE(CAST(document_number AS STRING), 'Unknown') AS document_number,
    CAST(-1 AS BIGINT) AS transaction_document_type_key,
    COALESCE(CAST(posting_period AS STRING), 'Unknown') AS posting_period,
    TO_DATE(CAST(posting_date AS STRING), 'yyyyMMdd') AS posting_date,
    COALESCE(CAST(document_currency_code AS STRING), 'Unknown') AS document_currency_code,
    CAST(actual_amount_dc AS DOUBLE) AS actual_amount_dc,
    COALESCE(CAST(office_currency_code AS STRING), 'Unknown') AS office_currency_code,
    CAST(actual_amount_oc AS DOUBLE) AS actual_amount_oc,
    COALESCE(CAST(group_currency_code AS STRING), 'Unknown') AS group_currency_code,
    CAST(actual_amount_gc AS DOUBLE) AS actual_amount_gc,
    CAST(budget_amount_gc AS DOUBLE) AS budget_amount_gc,
    CAST(forecast_amount_gc AS DOUBLE) AS forecast_amount_gc,
    CAST(lastupdatedt AS TIMESTAMP) AS last_updated_date_utc_at_source,
    COALESCE(CAST(_source_system AS STRING), 'lh_global_external_curated') AS source_system,
    'manual_run' AS inserted_process_instance_id,
    'manual_run' AS updated_process_instance_id,
    'manual_run' AS inserted_process_queue_id,
    'manual_run' AS updated_process_queue_id,
    current_timestamp() AS inserted_date_time,
    current_timestamp() AS updated_date_time
FROM {source_table}
""")

display(efi_df.limit(10))
