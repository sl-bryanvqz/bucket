def normalize_lookup_name(value):
    return "" if value is None else str(value).strip().lower()


def normalize_lookup_value(value):
    return "<NULL>" if value is None else str(value).strip()


def normalize_lookup_list(value):
    if value is None:
        return []

    if isinstance(value, (list, tuple)):
        return [str(item).strip() for item in value]

    return [part.strip() for part in str(value).split("|") if part.strip()]


def default_lookup_value(return_data_type):
    data_type = "" if return_data_type is None else str(return_data_type).lower()

    if any(token in data_type for token in ["string", "char", "varchar"]):
        return "Unknown"

    return "-1"


def build_sql_lookup_registry(lookup_definitions):
    """
    Builds a driver-side lookup registry and registers lookup_function for Spark SQL.

    SQL usage:
        lookup_function(
            'lookup_table_or_view_name',
            'return_column_name',
            array('key_column_1', 'key_column_2'),
            array(source_col_1, source_col_2),
            'string'
        )

    For numeric keys:
        CAST(lookup_function(...) AS BIGINT)
    """
    lookup_values = {}
    lookup_return_types = {}

    for lookup_definition in lookup_definitions:
        table_name = lookup_definition.get("table_name")
        key_columns = lookup_definition.get("key_columns", [])
        return_columns = lookup_definition.get("return_columns", [])

        if not table_name:
            raise ValueError("lookup_definitions requires table_name")

        if not key_columns:
            raise ValueError(f"lookup_definitions for {table_name} requires key_columns")

        if not return_columns:
            raise ValueError(f"lookup_definitions for {table_name} requires return_columns")

        df_lookup = spark.table(table_name)

        required_columns = list(dict.fromkeys(key_columns + return_columns))
        df_lookup = df_lookup.select(*required_columns).dropDuplicates()

        schema_by_name = {
            field.name.lower(): field.dataType.simpleString().lower()
            for field in df_lookup.schema.fields
        }

        rows = df_lookup.collect()

        for return_column in return_columns:
            registry_key = (
                normalize_lookup_name(table_name),
                normalize_lookup_name(return_column),
                tuple(normalize_lookup_name(col) for col in key_columns)
            )

            lookup_values[registry_key] = {}
            lookup_return_types[registry_key] = schema_by_name.get(
                normalize_lookup_name(return_column),
                ""
            )

            for row in rows:
                key_value = tuple(normalize_lookup_value(row[col]) for col in key_columns)

                if key_value not in lookup_values[registry_key]:
                    lookup_values[registry_key][key_value] = row[return_column]

    lookup_payload = {
        "values": lookup_values,
        "return_types": lookup_return_types
    }

    lookup_payload_broadcast = spark.sparkContext.broadcast(lookup_payload)

    def lookup_function(
        table_name,
        return_column_name,
        key_column_names,
        key_values,
        return_data_type
    ):
        payload = lookup_payload_broadcast.value

        normalized_key_columns = tuple(
            normalize_lookup_name(col)
            for col in normalize_lookup_list(key_column_names)
        )

        normalized_key_values = tuple(
            normalize_lookup_value(value)
            for value in normalize_lookup_list(key_values)
        )

        registry_key = (
            normalize_lookup_name(table_name),
            normalize_lookup_name(return_column_name),
            normalized_key_columns
        )

        effective_return_data_type = (
            return_data_type
            or payload["return_types"].get(registry_key)
            or ""
        )

        result = payload["values"].get(registry_key, {}).get(normalized_key_values)

        if result is None:
            return default_lookup_value(effective_return_data_type)

        return str(result)

    spark.udf.register("lookup_function", lookup_function, StringType())

    return lookup_payload_broadcast


