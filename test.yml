# ##### Resolve lakehouse paths

# CELL ********************

# Resolve lakehouse storage paths by name.
# This is the framework-friendly replacement for %%configure and scalar ID parameters.
source_lakehouse_path = notebookutils.lakehouse.get(source_lakehouse_name).properties["abfsPath"]
target_lakehouse_path = notebookutils.lakehouse.get(target_lakehouse_name).properties["abfsPath"]

logger.info(f"task_id: {task_id}")
logger.info(f"parent_run_id: {parent_run_id}")
logger.info(f"task_executions_id: {task_executions_id}")
logger.info(f"lineage_id: {lineage_id}")
logger.info(f"source_lakehouse_name: {source_lakehouse_name}")
logger.info(f"target_lakehouse_name: {target_lakehouse_name}")
logger.info(f"target_schema: {target_schema}")
logger.info(f"target_load_strategy: {target_load_strategy}")



