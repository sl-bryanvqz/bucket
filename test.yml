                '"task_id":', CAST(task_id AS varchar(20)), ',',
                '"task_name":', QUOTENAME(STRING_ESCAPE(task_name, 'json'), '"'), ',',
                '"source_connection_settings":', CAST(source_connection_settings AS nvarchar(max)), ',',
