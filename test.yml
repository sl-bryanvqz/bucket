# Tiny helper just for PK name normalization against clean_bronze_table output
def to_snake_case_local(string):
    string = re.sub(r"([a-z])([A-Z0-9])", r"\1_\2", string)
    string = re.sub(r"([A-Z])([A-Z][a-z])", r"\1_\2", string)
    return string.lower().strip()



results = []

for cfg in table_configs:
    source_name = cfg["source_name"]
    source_database = cfg["database_name"]
    source_schema_name = cfg["schema_name"]
    source_table_name = cfg["table_name"]
    select_columns = cfg["select_columns"]
    is_incremental = cfg["is_incremental"]
    incremental_column = cfg["incremental_column"]

    target_lakehouse_name = cfg["target_lakehouse_name"]
    target_schema_name = cfg["target_schema"]
    target_table_name = cfg["target_table"]
    target_load_strategy = cfg["load_strategy"]
    target_primary_keys = cfg["primary_keys"]

    logger.info(f"Starting {source_schema_name}.{source_table_name} -> {target_schema_name}.{target_table_name}")

    column_sql = ", ".join(select_columns) if select_columns else "*"
    full_source_name = f"{source_schema_name}.{source_table_name}"

    watermark_filter = ""
    if (
        is_incremental == 1
        and previous_watermark_datetime
        and current_watermark_datetime
        and incremental_column
    ):
        watermark_filter = f"""
        WHERE {incremental_column} > '{previous_watermark_datetime}'
          AND {incremental_column} <= '{current_watermark_datetime}'
        """

    source_query = f"""
    (
        SELECT {column_sql}
        FROM {full_source_name}
        {watermark_filter}
    ) AS src
    """

    logger.info(source_query)

    df_source = spark.read.jdbc(
        url=jdbc_url,
        table=source_query,
        properties=connection_properties
    )

    if limit_rows_for_debugging:
        df_source = df_source.limit(1000)

    temp_view_name = f"vw_{source_table_name.lower()}"
    df_source.createOrReplaceTempView(temp_view_name)

    logger.info(f"Created temp view {temp_view_name}")

    # Keep Mary's temp-view logic
    df_sql = spark.sql(f"SELECT * FROM {temp_view_name}")

    # Reuse workspace shared functions
    df_clean = clean_bronze_table(df_sql, limit_rows_for_debugging)
    df_clean = remove_exact_duplicates(df_clean)

    df_clean = add_metadata(
        df_clean,
        str(date.today()),
        full_source_name,
        source_name,
        target_table_name,
        lineage_id
    )

    primary_keys_snake = [to_snake_case_local(c) for c in target_primary_keys]

    df_clean = df_clean.withColumn(
        "_hashed_pk",
        F.sha2(F.concat_ws("||", *[F.col(c).cast("string") for c in primary_keys_snake]), 256)
    )

    target_lakehouse_path = notebookutils.lakehouse.get(target_lakehouse_name).properties["abfsPath"]
    target_table_path = f"{target_lakehouse_path}/Tables/{target_schema_name}/{target_table_name}"
    full_target_name = f"{target_schema_name}.{target_table_name}"

    spark.sql(f"CREATE SCHEMA IF NOT EXISTS {target_schema_name}")

    logger.info(f"Target path: {target_table_path}")

    load_to_target(df_clean, target_table_path, target_load_strategy)

    spark.sql(f"""
    CREATE TABLE IF NOT EXISTS {full_target_name}
    USING DELTA
    LOCATION '{target_table_path}'
    """)

    rows_written = spark.read.format("delta").load(target_table_path).count()

    logger.info(f"Loaded {rows_written} rows into {full_target_name}")

    results.append({
        "source_table": full_source_name,
        "target_table": full_target_name,
        "rows_written": rows_written
    })



print(results)



