# Check duplicate business keys before load
for cfg in table_config:
    target_table = cfg.get("target_table")
    duplicate_key = cfg.get("duplicate_key", "natural_key_hash")

    print(f"Checking duplicates for {target_table}")
    validate_duplicates(target_dfs[target_table], duplicate_key, 10)





# Load final DataFrames to silver taxonomy tables
status = "Failed"
load_results = []

try:
    for cfg in table_config:
        target_table = cfg.get("target_table")
        target_table_path = f"{location_root}/{target_table}"
        full_target_name = f"{target_schema}.{target_table}"

        df_target = target_dfs[target_table]
        rows_read = df_target.count()

        load_to_target(df_target, target_table_path, target_load_strategy)

        spark.sql(f"""
        CREATE TABLE IF NOT EXISTS {full_target_name}
        USING DELTA
        LOCATION '{target_table_path}'
        """)

        load_results.append({
            "table": full_target_name,
            "rows_read": rows_read,
            "rows_copied": rows_read
        })

        print(full_target_name)
        print(f"rows_copied: {rows_read}")

    status = "Completed"

except Exception:
    logger.exception("Processing error.")
    status = "Failed"
    raise
