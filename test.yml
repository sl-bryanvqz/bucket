def to_snake_case_local(string):
    string = re.sub(r"([a-z])([A-Z0-9])", r"\1_\2", string)
    string = re.sub(r"([A-Z])([A-Z][a-z])", r"\1_\2", string)
    return string.lower().strip()




results = []



for cfg in table_configs:
    logger.info(f"Starting {cfg['source_table']} -> {cfg['target_schema']}.{cfg['target_table']}")

    column_sql = ", ".join(cfg["select_columns"]) if cfg["select_columns"] else "*"
    full_source_name = f"{cfg['source_schema']}.{cfg['source_table']}"

    watermark_filter = ""
    if (
        cfg.get("is_incremental") == 1
        and previous_watermark_datetime
        and current_watermark_datetime
        and cfg.get("incremental_column")
    ):
        watermark_filter = f"""
        WHERE {cfg['incremental_column']} > '{previous_watermark_datetime}'
          AND {cfg['incremental_column']} <= '{current_watermark_datetime}'
        """

    source_query = f"""
    (
        SELECT {column_sql}
        FROM {full_source_name}
        {watermark_filter}
    ) AS src
    """

    logger.info(source_query)

    df_source = spark.read.jdbc(
        url=jdbc_url,
        table=source_query,
        properties=connection_properties
    )

    if limit_rows_for_debugging:
        df_source = df_source.limit(1000)

    temp_view_name = f"vw_{cfg['source_table'].lower()}"
    df_source.createOrReplaceTempView(temp_view_name)

    logger.info(f"Created temp view {temp_view_name}")

    df_sql = spark.sql(f"SELECT * FROM {temp_view_name}")

    df_clean = clean_bronze_table(df_sql, limit_rows_for_debugging)
    df_clean = remove_exact_duplicates(df_clean)

    df_clean = add_metadata(
        df_clean,
        str(date.today()),
        full_source_name,
        cfg["source_name"],
        cfg["target_table"],
        lineage_id
    )

    primary_keys_snake = [to_snake_case_local(c) for c in cfg["primary_keys"]]

    df_clean = df_clean.withColumn(
        "hashed_pk",
        F.sha2(F.concat_ws("||", *[F.col(c).cast("string") for c in primary_keys_snake]), 256)
    )

    target_lakehouse_path = notebookutils.lakehouse.get(cfg["target_lakehouse_name"]).properties["abfsPath"]
    target_table_path = f"{target_lakehouse_path}/Tables/{cfg['target_schema']}/{cfg['target_table']}"
    full_target_name = f"{cfg['target_schema']}.{cfg['target_table']}"

    spark.sql(f"CREATE SCHEMA IF NOT EXISTS {cfg['target_schema']}")

    load_to_target(df_clean, target_table_path, cfg["load_strategy"])

    spark.sql(f"""
    CREATE TABLE IF NOT EXISTS {full_target_name}
    USING DELTA
    LOCATION '{target_table_path}'
    """)

    rows_written = spark.read.format("delta").load(target_table_path).count()

    logger.info(f"Loaded {rows_written} rows into {full_target_name}")

    results.append({
        "source_table": full_source_name,
        "target_table": full_target_name,
        "rows_written": rows_written
    })



    print(results)



    for result in results:
    print(result["target_table"])
    df_target = spark.table(result["target_table"])
    print(df_target.count())
    display(df_target.limit(5))



    final_result = {
    "status": "SUCCESS",
    "tables_processed": len(results),
    "details": results,
    "lineage_id": lineage_id
}

print(final_result)
