for cfg in TABLE_CONFIGS:
    source_file = cfg["source_file"]
    target_table = cfg["target_table"]

    source_file_path = (
        f"abfss://{SOURCE_WORKSPACE_ID}@onelake.dfs.fabric.microsoft.com/"
        f"{SOURCE_LAKEHOUSE_ID}/{SOURCE_FOLDER}/{source_file}"
    )

    print(f"Processing {source_file} -> {TARGET_SCHEMA}.{target_table}")
    print(source_file_path)

    df = (
        spark.read.format("csv")
        .option("header", "true")
        .option("inferSchema", "true")
        .option("delimiter", ",")
        .load(source_file_path)
    )

    df = df.toDF(*[normalize_column_name(c) for c in df.columns])

    df = (
        df
        .withColumn("_ingest_time", F.current_timestamp())
        .withColumn("_source_file", F.lit(source_file))
        .withColumn("_source_system", F.lit(SOURCE_SYSTEM))
    )

    (
        df.write
        .format("delta")
        .mode(LOAD_MODE)
        .option("mergeSchema", "true")
        .saveAsTable(f"{TARGET_SCHEMA}.{target_table}")
    )

    print(f"Loaded {source_file} into {TARGET_SCHEMA}.{target_table}")
